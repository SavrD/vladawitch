<svg width="200" height="200" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background -->
    <linearGradient id="darkBlood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120000"/>
      <stop offset="100%" stop-color="#050000"/>
    </linearGradient>

    <!-- Bright blood stroke -->
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="20" height="20" rx="5" fill="url(#darkBlood)"/>

  <!-- Blood splashes -->
  <g fill="#8a0000">
    <circle cx="5" cy="5" r="0.6"/>
    <circle cx="18.5" cy="6" r="0.7"/>
    <circle cx="7" cy="17.5" r="0.5"/>
    <circle cx="16" cy="18.5" r="0.6"/>
    <circle cx="12" cy="4" r="0.4"/>
  </g>

  <!-- Blood drips -->
  <path d="M8 18 C8.2 20, 7.5 22, 8 23 C8.7 22, 9 20, 8.5 18Z" fill="#2a0000"/>
  <path d="M15 18 C15.2 20, 14.5 22, 15 23 C15.7 22, 16 20, 15.5 18Z" fill="#2a0000"/>

  <!-- Instagram outline (brighter) -->
  <g fill="none" stroke="#b30000" stroke-width="1.6" filter="url(#rough)">
    <rect x="6" y="6" width="12" height="12" rx="3"/>
    <circle cx="12" cy="12" r="3.3"/>
    <circle cx="16.5" cy="7.5" r="0.9"/>
  </g>
</svg>